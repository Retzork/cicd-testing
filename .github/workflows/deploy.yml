name: Deploy Web App via Self-Hosted Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    env:
      ARM_SUBSCRIPTION_ID: "dfaa40f0-0f72-4980-bd34-ccf9162a757d"
      ARM_CLIENT_ID: "04e9cad5-aacf-43ed-8ee5-29ceaa2b722d"
      WEBAPP_NAME: "app-cicd-bridge-2026-artha"
      RESOURCE_GROUP: "rg-cicd-bridge"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using Managed Identity
        run: |
          az login --identity --client-id $ARM_CLIENT_ID
          az account set --subscription $ARM_SUBSCRIPTION_ID
          echo "✅ Authenticated via Managed Identity (no secrets needed)"

      - name: Ensure zip is installed
        run: which zip || sudo apt-get install -y zip

      - name: Package and Deploy App
        run: |
          cd app
          zip -r ../deploy.zip .
          cd ..
          az webapp deploy --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME \
            --src-path deploy.zip \
            --type zip
          echo "🚀 Deployed to https://${WEBAPP_NAME}.azurewebsites.net"

      - name: Verify
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${WEBAPP_NAME}.azurewebsites.net)
          echo "🌐 HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Deployment verified!"
          fi
