name: Deploy Web App via Self-Hosted Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    env:
      ARM_SUBSCRIPTION_ID: "dfaa40f0-0f72-4980-bd34-ccf9162a757d"
      ARM_CLIENT_ID: "6dac8bc0-239b-47ea-b0d9-2f2dd271c591"
      WEBAPP_NAME: "app-cicd-bridge-2026-artha"
      RESOURCE_GROUP: "rg-cicd-bridge"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using Managed Identity
        run: |
          az login --identity --username $ARM_CLIENT_ID
          az account set --subscription $ARM_SUBSCRIPTION_ID
          echo "✅ Authenticated via Managed Identity (no secrets needed)"
          az account show --query "{name:name, id:id}" -o table

      - name: Package app
        run: |
          cd app
          zip -r ../app.zip .
          echo "📦 App packaged ($(du -h ../app.zip | cut -f1))"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME \
            --src-path app.zip \
            --type zip
          echo "🚀 Deployed to https://${WEBAPP_NAME}.azurewebsites.net"

      - name: Verify deployment
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${WEBAPP_NAME}.azurewebsites.net)
          echo "🌐 HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 301 ] || [ "$HTTP_STATUS" -eq 302 ]; then
            echo "✅ Deployment verified successfully!"
          else
            echo "⚠️ Unexpected status code, but deployment may still be propagating"
          fi
